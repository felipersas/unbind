name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --notes "Unbind ${{ github.ref_name }}"

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/unbind dist/unbind
          tar -C dist -czf unbind-${{ github.ref_name }}-${{ matrix.target }}.tar.gz unbind
          shasum -a 256 unbind-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > unbind-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" unbind-${{ github.ref_name }}-${{ matrix.target }}.tar.gz --repo "${{ github.repository }}" --clobber
          gh release upload "${{ github.ref_name }}" unbind-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256 --repo "${{ github.repository }}" --clobber
